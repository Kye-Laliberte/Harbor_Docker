services:
  postgres:
    image: postgres:16
    container_name: harbor-postgres
    environment:
      POSTGRES_USER: harbor_user
      POSTGRES_PASSWORD: harbor_password
      POSTGRES_DB: harbor_db
    ports:
      - "5432:5432"
    volumes:
      - harbor_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: harbor-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://harbor_user:harbor_password@postgres:5432/harbor_db
    depends_on:
      - postgres

volumes:
  harbor_data:
